services:
  - type: web
    name: social-media-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: social-media-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: social-media-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: social-media-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: social-media-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: social-media-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: DDL_AUTO
        value: update
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:19006,http://localhost:3000"
      - key: PORT
        value: 8080

databases:
  - name: social-media-db
    plan: free
    region: oregon
