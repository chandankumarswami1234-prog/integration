name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: social_media_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: social_media_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-not-for-production-use-only-32chars
        run: mvn -B clean verify

      - name: Build jar
        working-directory: ./backend
        run: mvn -B clean package -DskipTests

  deploy:
    name: Deploy to Render
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set - skipping deploy trigger."
            echo "Add it in GitHub repo Settings > Secrets > Actions."
            exit 0
          fi
          curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"